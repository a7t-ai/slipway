# ==========================================
# UNIT TESTS WORKFLOW
# ==========================================
# This workflow runs the iOS app's unit test suite
# It can be triggered in two ways:
# 1. Automatically on pull requests to main or develop branches
# 2. Manually via workflow_dispatch with custom iOS version
#
# The workflow uses Fastlane for test execution, which provides:
# - Better test management and reporting
# - Reusable test configurations
# - Consistent test execution across environments

name: Unit Tests

on:
  # ==========================================
  # AUTOMATIC TRIGGER
  # ==========================================
  # Runs automatically when a PR is opened/updated
  pull_request:
  
  # ==========================================
  # REUSABLE WORKFLOW TRIGGER
  # ==========================================
  # Allows this workflow to be called by other workflows
  workflow_call:
    inputs:
      scheme:
        description: 'Xcode Scheme'
        required: false
        default: '${{ vars.APP_NAME }} [Debug]'
        type: string
      device:
        description: 'iPhone Simulator Device'
        required: false
        default: 'iPhone 17'
        type: string
      ios_version:
        description: 'iOS Simulator Version'
        required: false
        default: '26.4'
        type: string
      test_plan:
        description: 'Test Plan (leave empty for all tests)'
        required: false
        type: string
      xcode_version:
        description: 'Xcode Version'
        required: false
        default: 'Xcode-26.4.1.app'
        type: string
      skip_slack_posting:
        description: 'Skip Slack notifications'
        required: false
        default: false
        type: boolean
    secrets:
      SLACK_WEBHOOK_GITHUB_EVENTS_CHANNEL:
        description: 'Slack webhook for notifications (optional)'
        required: false
  
  # ==========================================
  # MANUAL TRIGGER
  # ==========================================
  # Allows manual execution with custom parameters
  workflow_dispatch:
    inputs:
      scheme:
        description: 'Xcode Scheme'
        required: false
        default: '${{ vars.APP_NAME }} [Debug]'
        type: choice
        options:
        - '${{ vars.APP_NAME }} [Debug]'
      device:
        description: 'iPhone Simulator Device'
        required: false
        default: 'iPhone 17'
        type: choice
        options:
        - 'iPhone 17'
      ios_version:
        description: 'iOS Simulator Version'
        required: false
        default: '26.4'
        type: choice
        options:
        - '26.4'
      test_plan:
        description: 'Test Plan'
        required: false
        type: choice
        options:
        - '${{ vars.APP_NAME }} [Debug]'
      xcode_version:
        description: 'Xcode Version'
        required: false
        default: 'Xcode-26.4.1.app'
        type: choice
        options:
          - 'Xcode-26.4.1.app'

env:
  LANG: en_US.UTF-8
  LANGUAGE: en_US.UTF-8
  LC_ALL: en_US.UTF-8
  APP_NAME: ${{ vars.APP_NAME }}
  APP_SLUG: ${{ vars.APP_SLUG }}
  BUNDLE_ID: ${{ vars.BUNDLE_ID }}
  XCCONFIG_PATH: ${{ vars.XCCONFIG_PATH }}
  MARKETING_URL: ${{ vars.MARKETING_URL }}
  APPLE_ID: ${{ secrets.APPLE_ID }}
  APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}
  APPLE_ITC_TEAM_ID: ${{ secrets.APPLE_ITC_TEAM_ID }}
  MATCH_GIT_URL: ${{ secrets.MATCH_GIT_URL }}

jobs:
  test:
    name: iOS Tests
    runs-on: macos-latest
    timeout-minutes: 30
    
    steps:
    # ==========================================
    # STEP 1: CHECKOUT CODE
    # ==========================================
    # Fetch the repository with full history
    - name: Checkout code
      uses: actions/checkout@v4
      with:
        fetch-depth: 0

    # ==========================================
    # STEP 2: SETUP XCODE
    # ==========================================
    - name: Setup Xcode
      uses: ./.github/actions/setup-xcode
      with:
        xcode_version: ${{ inputs.xcode_version || 'Xcode-26.4.1.app' }}
    
    # Configure additional Xcode settings
    - name: Configure additional Xcode settings
      run: |
        echo "🔧 Configuring additional Xcode settings..."
        
        # Enable prebuilts for faster builds
        defaults write com.apple.dt.Xcode IDEPackageEnablePrebuilts YES
        echo "✅ IDEPackageEnablePrebuilts enabled"
        
        # Allow Swift macros if script exists
        if [ -f "scripts/allow_macros.sh" ]; then
          echo "🔐 Configuring Swift macros..."
          chmod +x scripts/allow_macros.sh
          ./scripts/allow_macros.sh
          echo "✅ Swift macros configured"
        else
          echo "⚠️ Allow macros script not found, skipping"
        fi
    
    # ==========================================
    # STEP 3: SETUP RUBY AND GEMS
    # ==========================================
    - name: Setup Ruby and Gems
      uses: ./.github/actions/setup-ruby-gems
    
    # ==========================================
    # STEP 4: COMPUTE METADATA
    # ==========================================
    # Prepare metadata for reporting and summary
    - name: Compute short SHA and start time
      run: |
        echo "SHORT_SHA=${GITHUB_SHA::7}" >> "$GITHUB_ENV"
        echo "START_TIME=$(date +%s)" >> "$GITHUB_ENV"
        
        # Determine which test plan to run
        if [ -n "${{ inputs.test_plan }}" ]; then
          echo "TEST_PLAN_DESC=${{ inputs.test_plan }} tests" >> "$GITHUB_ENV"
        else
          echo "TEST_PLAN_DESC=All tests" >> "$GITHUB_ENV"
        fi
    
    # ==========================================
    # STEP 5: RUN TESTS WITH FASTLANE
    # ==========================================
    # Execute tests using Fastlane's testing lanes
    # This replaces the direct xcodebuild commands
    - name: Run tests
      id: test
      env:
        FASTLANE_SKIP_UPDATE_CHECK: "1"
        FASTLANE_HIDE_GITHUB_ISSUES_WARNING: "1"
      run: |
        echo "🧪 Running tests via Fastlane"
        echo "🎯 Scheme: ${{ inputs.scheme || '${{ vars.APP_NAME }} [Debug]' }}"
        echo "📱 Device: ${{ inputs.device || 'iPhone 17' }}, iOS ${{ inputs.ios_version || '26.4' }}"
        echo "📋 Test Plan: ${{ env.TEST_PLAN_DESC }}"
        
        # Verify we're using the correct Ruby and bundle
        echo "🔧 Ruby version: $(ruby --version)"
        echo "📦 Bundle version: $(bundle --version)"
        echo "📍 Ruby path: $(which ruby)"
        echo "📍 Bundle path: $(which bundle)"
        
        # Build Fastlane command with proper parameter formatting
        # Use variables to avoid shell parsing issues with spaces in parameters
        SCHEME="${{ inputs.scheme || '${{ vars.APP_NAME }} [Debug]' }}"
        DEVICE="${{ inputs.device || 'iPhone 17' }}"
        IOS_VERSION="${{ inputs.ios_version || '26.4' }}"
        TEST_PLAN="${{ inputs.test_plan }}"
        
        echo "🚀 Executing Fastlane ci_test with parameters:"
        echo "  scheme: $SCHEME"
        echo "  device: $DEVICE" 
        echo "  ios_version: $IOS_VERSION"
        echo "  test_plan: ${TEST_PLAN:-'(all tests)'}"
        
        # Execute Fastlane with proper parameter passing (with verbose output to see test progress)
        if [ -n "$TEST_PLAN" ]; then
          bundle exec fastlane ci_test scheme:"$SCHEME" device:"$DEVICE" ios_version:"$IOS_VERSION" test_plan:"$TEST_PLAN"
        else
          bundle exec fastlane ci_test scheme:"$SCHEME" device:"$DEVICE" ios_version:"$IOS_VERSION"
        fi
            
    # ==========================================
    # STEP 6: UPLOAD TEST ARTIFACTS
    # ==========================================
    # Upload test results for later analysis
    - name: Upload test results
      if: always()
      uses: actions/upload-artifact@v4
      with:
        name: test-results-${{ github.run_number }}
        path: |
          TestResults/*.xcresult
        retention-days: 21  # Keep for three weeks for debugging
        
    # ==========================================
    # STEP 7: DEBUG TEST RESULTS
    # ==========================================
    # Debug file paths and show test results information
    - name: Debug test results location
      if: always()
      run: |
        echo "🔍 Debugging test results location..."
        echo "Current directory: $(pwd)"
        echo "Contents of current directory:"
        ls -la
        echo ""
        echo "Looking for TestResults directory:"
        find . -name "TestResults" -type d 2>/dev/null || echo "No TestResults directory found"
        echo ""
        echo "Looking for xcresult bundles:"
        find . -name "*.xcresult" 2>/dev/null || echo "No xcresult bundles found"
        echo ""
        echo "Contents of TestResults (if exists):"
        if [ -d "TestResults" ]; then
          ls -la TestResults/
          echo ""
          echo "📄 Checking xcresult bundles:"
          for xcresult in TestResults/*.xcresult; do
            if [ -d "$xcresult" ]; then
              echo "Found xcresult bundle: $(basename "$xcresult")"
              echo "Bundle size: $(du -sh "$xcresult" | awk '{print $1}')"
              # Try to get test summary from xcresult
              if command -v xcrun >/dev/null 2>&1; then
                echo "Test summary:"
                xcrun xcresulttool get test-results summary --path "$xcresult" 2>/dev/null | head -10 || echo "Could not extract test summary"
              fi
            fi
          done
        else
          echo "TestResults directory does not exist"
        fi
        echo ""
        echo "Looking for test output in fastlane directory:"
        if [ -d "fastlane" ]; then
          find fastlane -name "*.xml" -o -name "*.xcresult" 2>/dev/null || echo "No test files in fastlane directory"
        fi
        echo ""
        echo "Looking for scan output directories:"
        find . -name "scan-*" -type d 2>/dev/null || echo "No scan output directories found"
        echo ""
        echo "Looking for test_output directories:"
        find . -name "test_output" -type d 2>/dev/null || echo "No test_output directories found"
        
    
    # ==========================================
    # STEP 8: POST WORKFLOW SUMMARY
    # ==========================================
    # Create a summary visible in the Actions tab
    - name: Post test summary
      if: always()
      run: |
        echo "## 🧪 Test Summary" >> $GITHUB_STEP_SUMMARY
        echo "" >> $GITHUB_STEP_SUMMARY
        
        # Check test outcome
        if [ "${{ steps.test.outcome }}" = "success" ]; then
          echo "✅ **All tests passed successfully!**" >> $GITHUB_STEP_SUMMARY
        elif [ "${{ steps.test.outcome }}" = "failure" ]; then
          echo "❌ **Tests failed**" >> $GITHUB_STEP_SUMMARY
          
          # Include Fastlane summary if available
          if [ -f "TestResults/summary.md" ]; then
            echo "" >> $GITHUB_STEP_SUMMARY
            echo "### Test Results:" >> $GITHUB_STEP_SUMMARY
            cat TestResults/summary.md >> $GITHUB_STEP_SUMMARY
          fi
          
          # Try to extract failure details
          if [ -d "TestResults" ]; then
            echo "" >> $GITHUB_STEP_SUMMARY
            echo "### Failure Details:" >> $GITHUB_STEP_SUMMARY
            # Look for xcresult file
            XCRESULT=$(find TestResults -name "*.xcresult" -type d | head -n 1)
            if [ -n "$XCRESULT" ]; then
              xcrun xcresulttool get test-results summary --path "$XCRESULT" >> $GITHUB_STEP_SUMMARY 2>/dev/null || echo "Could not extract detailed test results" >> $GITHUB_STEP_SUMMARY
            fi
          fi
        else
          echo "⚠️ **Tests did not complete**" >> $GITHUB_STEP_SUMMARY
        fi
        
        echo "" >> $GITHUB_STEP_SUMMARY
        echo "### Test Configuration:" >> $GITHUB_STEP_SUMMARY
        echo "- **Test Plan:** ${{ env.TEST_PLAN_DESC }}" >> $GITHUB_STEP_SUMMARY
        echo "- **Scheme:** ${{ inputs.scheme || '${{ vars.APP_NAME }} [Debug]' }}" >> $GITHUB_STEP_SUMMARY
        echo "- **Device:** ${{ inputs.device || 'iPhone 17' }}" >> $GITHUB_STEP_SUMMARY
        echo "- **iOS Version:** ${{ inputs.ios_version || '26.4' }}" >> $GITHUB_STEP_SUMMARY
        echo "- **Xcode Version:** ${{ inputs.xcode_version || 'Xcode-26.4.1.app' }}" >> $GITHUB_STEP_SUMMARY
        echo "- **Execution:** Fastlane ci_test lane" >> $GITHUB_STEP_SUMMARY
        
    # ==========================================
    # STEP 9: FAIL JOB IF TESTS FAILED
    # ==========================================
    # Ensure the job fails if tests didn't pass
    - name: Fail job if tests failed
      if: always() && steps.test.outcome == 'failure'
      run: |
        echo "❌ Tests failed - failing the job"
        exit 1
    
    # ==========================================
    # STEP 10: CALCULATE DURATION
    # ==========================================
    # Calculate test execution time for reporting
    - name: Calculate duration
      if: always()
      run: |
        END_TIME=$(date +%s)
        DURATION=$((END_TIME - START_TIME))
        MINUTES=$((DURATION / 60))
        SECONDS=$((DURATION % 60))
        if [ $MINUTES -gt 0 ]; then
          echo "DURATION_TEXT=${MINUTES}m ${SECONDS}s" >> "$GITHUB_ENV"
        else
          echo "DURATION_TEXT=${SECONDS}s" >> "$GITHUB_ENV"
        fi
    
    # ==========================================
    # STEP 11: SEND SLACK NOTIFICATION
    # ==========================================
    # Notify team via Slack about test results (only if not skipped)
    - name: Slack Notification
      if: always() && !inputs.skip_slack_posting
      uses: slackapi/slack-github-action@v2.1.0
      with:
        webhook: ${{ secrets.SLACK_WEBHOOK_GITHUB_EVENTS_CHANNEL }}
        webhook-type: incoming-webhook
        payload: |
          {
            "text": "${{ vars.APP_NAME }} iOS - Test Results: ${{ steps.test.outcome == 'success' && '✅ Passed' || steps.test.outcome == 'failure' && '❌ Failed' || '⚠️ Incomplete' }} (${{ env.TEST_PLAN_DESC }})",
            "blocks": [
              {
                "type": "header",
                "text": {
                  "type": "plain_text",
                  "text": "🧪 ${{ vars.APP_NAME }} iOS - Test Results",
                  "emoji": true
                }
              },
              {
                "type": "section",
                "fields": [
                  {
                    "type": "mrkdwn",
                    "text": "*Status:*\n${{ steps.test.outcome == 'success' && '✅ Passed' || steps.test.outcome == 'failure' && '❌ Failed' || '⚠️ Incomplete' }}"
                  },
                  {
                    "type": "mrkdwn",
                    "text": "*Test Plan:*\n${{ env.TEST_PLAN_DESC }}"
                  },
                  {
                    "type": "mrkdwn",
                    "text": "*Scheme:*\n${{ inputs.scheme || '${{ vars.APP_NAME }} [Debug]' }}"
                  },
                  {
                    "type": "mrkdwn",
                    "text": "*Platform:*\n${{ inputs.device || 'iPhone 17' }}, iOS ${{ inputs.ios_version || '26.4' }}"
                  },
                  {
                    "type": "mrkdwn",
                    "text": "*Duration:*\n${{ env.DURATION_TEXT }}"
                  }
                ]
              },
              {
                "type": "section",
                "text": {
                  "type": "mrkdwn",
                  "text": "*Branch:* `${{ github.event.pull_request.head.ref || github.ref_name }}`\n*Commit:* <https://github.com/${{ github.repository }}/commit/${{ github.sha }}|`${{ env.SHORT_SHA }}`>\n*Workflow:* <${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}|View Run #${{ github.run_number }}>${{ github.event.pull_request && format('\n*Pull Request:* <{0}|#{1}>', github.event.pull_request.html_url, github.event.pull_request.number) || '' }}"
                }
              }
            ]
          }