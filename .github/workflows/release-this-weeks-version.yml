# ==========================================
# RELEASE THIS WEEK'S VERSION WORKFLOW
# ==========================================

name: Release This Week's Version

permissions:
  contents: write
  issues: write

on:
  # ==========================================
  # SCHEDULED TRIGGER (DISABLED)
  # ==========================================
  schedule:
     - cron: '0 12 * * 5'  # Every Friday at 12 PM UTC (1 PM CET)

  workflow_dispatch:
    inputs:
      platform:
        description: 'Platform'
        required: true
        default: 'iOS'
        type: choice
        options:
          - 'iOS'
      version:
        description: 'Version to release (leave empty to auto-detect)'
        required: false
        type: string
        default: ''
      release_date:
        description: 'Release date (format: YYYY-MM-DD)'
        required: false
        type: string
        default: ''
      xcode_version:
        description: 'Xcode Version'
        required: false
        default: 'Xcode-26.4.1.app'
        type: choice
        options:
          - 'Xcode-26.4.1.app'
      skip_slack_posting:
        description: 'Skip Slack notifications'
        required: false
        type: boolean
        default: false

  workflow_call:
    inputs:
      platform:
        description: 'Platform'
        required: false
        default: 'iOS'
        type: string
      version:
        description: 'Version to release'
        required: false
        default: ''
        type: string
      release_date:
        description: 'Release date'
        required: false
        default: ''
        type: string
      xcode_version:
        description: 'Xcode Version'
        required: false
        default: 'Xcode-26.4.1.app'
        type: string
      skip_slack_posting:
        description: 'Skip Slack notifications'
        required: false
        default: true
        type: boolean
    secrets:
      APP_STORE_CONNECT_KEY_ID:
        required: true
      APP_STORE_CONNECT_ISSUER_ID:
        required: true
      APP_STORE_CONNECT_KEY_CONTENT:
        required: true
      SLACK_WEBHOOK_GITHUB_EVENTS_CHANNEL:
        required: false

env:
  LANG: en_US.UTF-8
  LANGUAGE: en_US.UTF-8
  LC_ALL: en_US.UTF-8
  APP_NAME: ${{ vars.APP_NAME }}
  APP_SLUG: ${{ vars.APP_SLUG }}
  BUNDLE_ID: ${{ vars.BUNDLE_ID }}
  XCCONFIG_PATH: ${{ vars.XCCONFIG_PATH }}
  MARKETING_URL: ${{ vars.MARKETING_URL }}
  APPLE_ID: ${{ secrets.APPLE_ID }}
  APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}
  APPLE_ITC_TEAM_ID: ${{ secrets.APPLE_ITC_TEAM_ID }}
  MATCH_GIT_URL: ${{ secrets.MATCH_GIT_URL }}

jobs:
  determine-version:
    name: Determine Version Ready for Release
    runs-on: macos-latest
    timeout-minutes: 10
    outputs:
      version: ${{ steps.version.outputs.version }}
      platform: ${{ steps.version.outputs.platform }}
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 1
      - name: Setup Ruby and Gems
        uses: ./.github/actions/setup-ruby-gems
      - name: Determine release version
        id: version
        env:
          FASTLANE_SKIP_UPDATE_CHECK: "1"
          FASTLANE_HIDE_GITHUB_ISSUES_WARNING: "1"
          APP_STORE_CONNECT_KEY_ID: ${{ secrets.APP_STORE_CONNECT_KEY_ID }}
          APP_STORE_CONNECT_ISSUER_ID: ${{ secrets.APP_STORE_CONNECT_ISSUER_ID }}
          APP_STORE_CONNECT_KEY_CONTENT: ${{ secrets.APP_STORE_CONNECT_KEY_CONTENT }}
        run: |
          PLATFORM="${{ inputs.platform }}"
          if [ -z "$PLATFORM" ]; then PLATFORM="iOS"; fi

          if [ -n "${{ inputs.version }}" ]; then
            VERSION="${{ inputs.version }}"
            OUTPUT=$(bundle exec fastlane validate_app_store_version_for_release version:"$VERSION" platform:"$PLATFORM" 2>&1 || echo "")
            echo "$OUTPUT"
            if ! echo "$OUTPUT" | grep -q "is ready for release"; then
              echo "❌ Version $VERSION is not ready for release"
              exit 1
            fi
          else
            set +e
            OUTPUT=$(bundle exec fastlane ios find_version_ready_for_release platform:"$PLATFORM" 2>&1)
            EXIT_CODE=$?
            set -e
            echo "$OUTPUT"
            if [ $EXIT_CODE -ne 0 ]; then exit 1; fi

            VERSION=$(echo "$OUTPUT" | grep -o "Found version ready for release: [0-9]\+\.[0-9]\+\.[0-9]\+" | sed 's/Found version ready for release: //' | head -1 || echo "")
            if [ -z "$VERSION" ]; then
              VERSION=$(echo "$OUTPUT" | grep -o "✅ Found version ready for release: [0-9]\+\.[0-9]\+\.[0-9]\+" | sed 's/.*: //' | head -1 || echo "")
            fi
            if [ -z "$VERSION" ]; then
              echo "❌ Failed to find version ready for release"
              exit 1
            fi
          fi

          echo "🚀 Version to release: $VERSION"
          echo "version=$VERSION" >> $GITHUB_OUTPUT
          echo "platform=$PLATFORM" >> $GITHUB_OUTPUT

  release-app:
    name: Release App to App Store
    needs: [determine-version]
    uses: ./.github/workflows/release-app.yml
    with:
      platform: ${{ needs.determine-version.outputs.platform || inputs.platform }}
      version: ${{ needs.determine-version.outputs.version }}
      phased_release: 'true'
      auto_release_date: ${{ inputs.release_date }}
      xcode_version: ${{ inputs.xcode_version }}
      skip_slack_posting: true
    secrets:
      APP_STORE_CONNECT_KEY_ID: ${{ secrets.APP_STORE_CONNECT_KEY_ID }}
      APP_STORE_CONNECT_ISSUER_ID: ${{ secrets.APP_STORE_CONNECT_ISSUER_ID }}
      APP_STORE_CONNECT_KEY_CONTENT: ${{ secrets.APP_STORE_CONNECT_KEY_CONTENT }}
      SLACK_WEBHOOK_GITHUB_EVENTS_CHANNEL: ${{ secrets.SLACK_WEBHOOK_GITHUB_EVENTS_CHANNEL }}

  notify-final-status:
    name: Send Final Status Notification
    runs-on: macos-latest
    needs: [determine-version, release-app]
    if: always() && !inputs.skip_slack_posting
    timeout-minutes: 5
    steps:
      - name: Send Slack notification
        uses: slackapi/slack-github-action@v2.1.0
        with:
          webhook: ${{ secrets.SLACK_WEBHOOK_GITHUB_EVENTS_CHANNEL }}
          webhook-type: incoming-webhook
          payload: |
            {
              "text": "${{ vars.APP_NAME }} iOS - This Week's Version Release: ${{ needs.determine-version.outputs.version }}",
              "blocks": [
                {
                  "type": "header",
                  "text": { "type": "plain_text", "text": "🚀 ${{ vars.APP_NAME }} iOS - This Week's Version Release", "emoji": true }
                },
                {
                  "type": "section",
                  "fields": [
                    { "type": "mrkdwn", "text": "*Status:*\n${{ needs.release-app.outputs.status == 'success' && '✅ Released' || '❌ Failed' }}" },
                    { "type": "mrkdwn", "text": "*Version:*\n`${{ needs.determine-version.outputs.version }}`" },
                    { "type": "mrkdwn", "text": "*Release Type:*\n📊 Phased Release" }
                  ]
                },
                {
                  "type": "section",
                  "text": { "type": "mrkdwn", "text": "*Workflow:* <${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}|View Run #${{ github.run_number }}>" }
                }
              ]
            }
