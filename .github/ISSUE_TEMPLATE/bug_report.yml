name: Bug report
description: A workflow, Fastlane lane, or script is misbehaving
labels: ["bug"]
body:
  - type: markdown
    attributes:
      value: |
        Thanks for filing a bug. The faster we can reproduce it, the faster we can fix it.
  - type: dropdown
    id: area
    attributes:
      label: Which area?
      options:
        - GitHub Actions workflow
        - Fastlane lane
        - Python / shell script
        - Documentation
    validations:
      required: true
  - type: input
    id: file
    attributes:
      label: Specific file
      placeholder: ".github/workflows/release-app.yml · fastlane/Fastfile.delivery.rb · scripts/generate_icons.py · ..."
    validations:
      required: true
  - type: textarea
    id: what-happened
    attributes:
      label: What happened?
      description: Include the run URL or a log snippet (sanitize any secrets first).
    validations:
      required: true
  - type: textarea
    id: expected
    attributes:
      label: What did you expect to happen?
    validations:
      required: true
  - type: textarea
    id: repro
    attributes:
      label: Reproduction steps
      placeholder: |
        1. …
        2. …
        3. …
    validations:
      required: true
  - type: input
    id: env
    attributes:
      label: Environment
      placeholder: "macOS 15.0 · Xcode 16.2 · fastlane 2.225 · ruby 3.3 · runner: macos-15 / self-hosted"
